name: IPTV Link Processor

on:
  schedule:
    - cron: '0 */12 * * *'   # প্রতি ১২ ঘণ্টায়
  workflow_dispatch:

permissions:
  contents: write

# ✅ FIX: concurrency group — একই সময়ে শুধু ১টি processor চলবে
concurrency:
  group: iptv-processor
  cancel-in-progress: true

jobs:
  run-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        # ✅ FIX: processor.yml এ ffmpeg ছিল না — quality_detector.py এর ffprobe এর জন্য দরকার
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        # ✅ FIX: সব দরকারি package install — আগে শুধু requests aiohttp ছিল
        run: |
          python -m pip install --upgrade pip
          pip install requests aiohttp beautifulsoup4 lxml pytz

      - name: Show Repository Structure
        run: |
          echo "====== ROOT FILES ======"
          ls -la
          echo ""
          echo "====== MOVIES FOLDER ======"
          ls -la Movies/ 2>/dev/null || echo "Movies/ folder নেই!"
          echo ""
          echo "====== LIVETV FOLDER ======"
          ls -la LiveTV/ 2>/dev/null || echo "LiveTV/ folder নেই (script তৈরি করবে)"

      - name: Run Processor Script
        run: |
          echo "Python: $(python --version)"
          python processor.py
          echo "✅ Script সফলভাবে শেষ হয়েছে"

      - name: Show Output Files
        run: |
          echo "====== Generated Output ======"
          ls -lh all_movies.json offline_movie.json offline_movie.m3u 2>/dev/null || true
          ls -lh LiveTV/ 2>/dev/null || true
          echo ""
          cat logs/processor_report.txt 2>/dev/null || true

      - name: Commit and Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # ✅ FIX: push এর আগে pull — conflict এড়ায়
          git pull --rebase origin main || true

          # পুরনো space-নামের file গুলো git থেকে সরাই
          git rm -f "offline movie.json" "offline movie.m3u" \
                    "LiveTV/offline Tv.json" "LiveTV/offline Tv.m3u" 2>/dev/null || true

          git add all_movies.json offline_movie.json offline_movie.m3u \
                  LiveTV/ logs/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "কোনো পরিবর্তন নেই"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S UTC')
            git commit -m "🔄 Auto-updated IPTV playlists [$TIMESTAMP]"
            # ✅ FIX: push fail হলে retry
            git push origin main || (git pull --rebase origin main && git push origin main)
            echo "✅ Push সফল"
          fi
