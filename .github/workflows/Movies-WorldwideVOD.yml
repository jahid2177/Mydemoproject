name: Movies-WorldwideVOD Update

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

# ✅ FIX: cancel-in-progress: false — একটা fail হলেও বাকিগুলো চলে
# ✅ FIX: iptv-writes group — auto-update ও processor এর সাথে conflict এড়াতে
concurrency:
  group: iptv-writes
  cancel-in-progress: false

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz beautifulsoup4

      - name: Run Movies-WorldwideVOD collector
        run: python collector/Movies-WorldwideVOD.py

      - name: Commit and push output files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add Movies/WorldwideVOD/Movies.m3u Movies/WorldwideVOD/Movies.json Movies/WorldwideVOD/Movies_app.json
          git commit -m "🎬 Movies-WorldwideVOD updated — $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin main || (git pull --rebase origin main && git push origin main)
