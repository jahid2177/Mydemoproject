name: Movies-Bollywood Update

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iptv-writes
  cancel-in-progress: false

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz beautifulsoup4

      - name: Run Movies-Bollywood collector
        run: python collector/Movies-Bollywood.py

      - name: Commit and push output files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          
          # ফাইলগুলো থাকলে তবেই গিট অ্যাড এবং পুশ করবে
          if [ -f "Movies/Bollywood/Movies.m3u" ]; then
            git add Movies/Bollywood/Movies.m3u Movies/Bollywood/Movies.json Movies/Bollywood/Movies_app.json
            git commit -m "🎬 Movies-Bollywood updated — $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "⚠️ No output files generated, skipping commit to protect old links."
          fi
