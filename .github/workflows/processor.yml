name: IPTV Link Processor

on:
  schedule:
    - cron: '0 6,18 * * *'   # দিনে ২ বার — auto-update.yml এর সাথে overlap এড়াতে
  workflow_dispatch:

permissions:
  contents: write

# ✅ auto-update.yml এর সাথে একই group "iptv-writes"
# দুটো workflow LiveTV/ ও logs/ এ একসাথে push করলে conflict হত
concurrency:
  group: iptv-writes
  cancel-in-progress: false

jobs:
  run-processor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        # ✅ FIX: requirements.txt ব্যবহার করা হচ্ছে — সব dependency এক জায়গায়
        # plus explicit aiohttp — processor.py এর async checker এর জন্য অপরিহার্য
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiohttp  # explicit ensure — async stream checker এর জন্য

      - name: Show Repository Structure
        run: |
          echo "====== ROOT FILES ======"
          ls -la
          echo ""
          echo "====== MOVIES FOLDER ======"
          ls -la Movies/ 2>/dev/null || echo "Movies/ folder নেই!"
          echo ""
          echo "====== LIVETV FOLDER ======"
          ls -la LiveTV/ 2>/dev/null || echo "LiveTV/ folder নেই"

      - name: Run Processor Script
        run: |
          echo "Python: $(python --version)"
          python processor.py
          echo "✅ Script সফলভাবে শেষ হয়েছে"

      - name: Show Output Files
        run: |
          echo "====== Generated Output ======"
          ls -lh all_movies.json offline_movie.json offline_movie.m3u 2>/dev/null || true
          ls -lh LiveTV/ 2>/dev/null || true
          echo ""
          cat logs/processor_report.txt 2>/dev/null || true

      - name: Commit and Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git pull --rebase origin main || true

          # ✅ FIX: পুরনো space-নামের files git থেকে সরাই — সব variant cover করা হচ্ছে
          git rm --cached -f -- "offline movie.json" "offline movie.m3u" \
                    "LiveTV/offline Tv.json" "LiveTV/offline Tv.m3u" \
                    "LiveTV/offline tv.json" "LiveTV/offline tv.m3u" 2>/dev/null || true
          rm -f "offline movie.json" "offline movie.m3u" \
                "LiveTV/offline Tv.json" "LiveTV/offline Tv.m3u" \
                "LiveTV/offline tv.json" "LiveTV/offline tv.m3u" 2>/dev/null || true

          git add all_movies.json offline_movie.json offline_movie.m3u \
                  LiveTV/ logs/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "কোনো পরিবর্তন নেই"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S UTC')
            git commit -m "🔄 Auto-updated IPTV playlists [$TIMESTAMP]"
            git push origin main || (git pull --rebase origin main && git push origin main)
            echo "✅ Push সফল"
          fi
