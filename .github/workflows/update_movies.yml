name: Auto Update Movies

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iptv-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Collector
        run: |
          python scripts/collect_movies.py

      - name: Check generated files
        run: |
          echo "=== File sizes ==="
          ls -lh movies_link.json duplicate_link.json 2>/dev/null || true
          echo "=== Movie count ==="
          python -c "import json; data=json.load(open('movies_link.json')); print(f'Movies: {len(data)}')" 2>/dev/null || true

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add movies_link.json duplicate_link.json
          if git diff --staged --quiet; then
            echo "কোনো পরিবর্তন নেই"
          else
            git commit -m "Auto Update Movie Links — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main || (git pull --rebase origin main && git push origin main)
          fi
