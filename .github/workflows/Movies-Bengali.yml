name: Movies-Bengali Update

on:
  schedule:
    - cron: '0 0,8,16 * * *'   # দিনে ৩ বার — 00:00, 08:00, 16:00 UTC
  workflow_dispatch:

permissions:
  contents: write

# ✅ FIX: global concurrency group — সব Movies-* workflow একসাথে push করলে conflict হয়
# একটি shared group দিলে সব সিরিয়ালি চলবে
concurrency:
  group: movies-update
  cancel-in-progress: false   # cancel না করে queue করো

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz beautifulsoup4

      - name: Run Movies-Bengali collector
        run: python collector/Movies-Bengali.py

      - name: Commit and push output files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # ✅ FIX: commit এর আগে pull করো — অন্য workflow push করলেও conflict হবে না
          git pull --rebase origin main || true
          git add Movies/Bengali/Movies.m3u Movies/Bengali/Movies.json Movies/Bengali/Movies_app.json
          git commit -m "🎬 Movies-Bengali updated — $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push origin main || (git pull --rebase origin main && git push origin main)
