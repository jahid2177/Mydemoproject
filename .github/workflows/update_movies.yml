name: Auto Update Movies

on:
  schedule:
    # দিনে ৩ বার
    - cron: '0 */8 * * *'
  workflow_dispatch:

# রিপোজিটরিতে কোড পুশ করার জন্য এই পারমিশনটি দেওয়া বাধ্যতামূলক
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Collector
        run: |
          python scripts/collect_movies.py

      # ফাইলগুলো ঠিকমতো তৈরি হয়েছে কিনা তা চেক করার জন্য একটি ডিবাগ স্টেপ
      - name: Check generated files
        run: ls -la

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "Auto Update Movie Links" || echo "No changes"
          git push
