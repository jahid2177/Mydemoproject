name: Movies-WorldwideVOD Update

on:
  schedule:
    - cron: '0 0,8,16 * * *'   # দিনে ৩ বার — 00:00, 08:00, 16:00 UTC
  workflow_dispatch:             # Manual trigger ও করা যাবে

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-movies:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests pytz beautifulsoup4

      - name: Run Movies-WorldwideVOD collector
        run: python collector/Movies-WorldwideVOD.py

      - name: Commit and push output files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Movies/WorldwideVOD/Movies.m3u Movies/WorldwideVOD/Movies.json Movies/WorldwideVOD/Movies_app.json
          git commit -m "🎬 Movies-WorldwideVOD updated — $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git pull --rebase origin main
          git push
